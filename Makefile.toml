# ----------------------------------------------------
# A. ZAMKNIДҳCIE CYKLU
# ----------------------------------------------------
[tasks.v-finish-dist]
description = "Publikuje stabilnД… dystrybucjДҷ (odcina sufiksy, np. rc.7 -> 0.5.0)"
command = "powershell"
args = ["-Command", "$base = $env:CARGO_MAKE_CRATE_VERSION.Split('-')[0]; cargo set-version $base"]

# ----------------------------------------------------
# B-D. OTWIERANIE NOWEGO CYKLU (Tworzy czyste pЕӮГіtno do pracy)
# ----------------------------------------------------
[tasks.v-start-patch]
description = "Otwiera cykl poprawkowy (np. 0.5.0 -> 0.5.1-dev.1)"
command = "powershell"
args = ["-Command", "$v=$env:CARGO_MAKE_CRATE_VERSION.Split('-')[0].Split('.'); $new_v=\"$($v[0]).$($v[1]).$([int]$v[2]+1)-dev.1\"; cargo set-version $new_v"]

[tasks.v-start-minor]
description = "Otwiera nowy cykl funkcji (np. 0.5.0 -> 0.6.0-dev.1)"
command = "powershell"
args = ["-Command", "$v=$env:CARGO_MAKE_CRATE_VERSION.Split('-')[0].Split('.'); $new_v=\"$($v[0]).$([int]$v[1]+1).0-dev.1\"; cargo set-version $new_v"]

[tasks.v-start-major]
description = "Otwiera nowy cykl fundamentГіw (np. 0.5.0 -> 1.0.0-dev.1)"
command = "powershell"
args = ["-Command", "$v=$env:CARGO_MAKE_CRATE_VERSION.Split('-')[0].Split('.'); $new_v=\"$([int]$v[0]+1).0.0-dev.1\"; cargo set-version $new_v"]

# ----------------------------------------------------
# E-F. BIEЕ»Д„CA PRACA I AWANSE (Silnik organicznego tworzenia)
# ----------------------------------------------------
[tasks.v-next--point]
description = "Podbija punkt w obecnej fazie prerelease (np. dev.1 -> dev.2)"
command = "cargo"
args = ["set-version", "--bump", "prerelease"]

[tasks.v-next--phase]
description = "Awansuje projekt do kolejnej fazy (dev -> snapshot -> alpha -> beta -> rc)"
command = "powershell"
args = [
    "-Command", 
    """
    $base = $env:CARGO_MAKE_CRATE_VERSION.Split('-')[0];
    $suffix = $env:CARGO_MAKE_CRATE_VERSION.Split('-')[1];
    if (-not $suffix) { Write-Host 'вқҢ JesteЕӣ na stabilnej wersji! UЕјyj v-start-*, aby zaczД…ДҮ nowy cykl.'; exit 1 }
    
    $current_phase = $suffix.Split('.')[0];
    switch ($current_phase) {
        'dev'      { $next = 'snapshot.1' }
        'snapshot' { $next = 'alpha.1' }
        'alpha'    { $next = 'beta.1' }
        'beta'     { $next = 'rc.1' }
        'rc'       { Write-Host 'вқҢ JesteЕӣ w fazie RC! UЕјyj v-finish-dist, aby wydaДҮ stabilnД… dystrybucjДҷ.'; exit 1 }
        default    { Write-Host \"вқҢ Nieznana faza: $current_phase\"; exit 1 }
    }
    
    cargo set-version \"$base-$next\";
    Write-Host \"вң… Awansowano z $current_phase na fazДҷ: $($next.Split('.')[0].ToUpper())\" -ForegroundColor Green;
    """
]

# ----------------------------------------------------
# G. TAGOWANIE WERSJI
# ----------------------------------------------------

[tasks.v-add-hashtag]
description = "Commituje zmiany, pobiera hasz i tworzy lokalny tag wersji (bez pusha)"
command = "powershell"
args = [
    "-Command",
    """
    $OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;
    
    # 1) Odczyt wersji z Cargo.toml
    $ver = $env:CARGO_MAKE_CRATE_VERSION
    Write-Host "`nрҹ“Ұ 1/5: Wykryto wersjДҷ Cargo.toml: v$ver" -ForegroundColor Cyan;
    
    # 2) git add .
    Write-Host 'вһ• 2/5: Dodawanie plikГіw do indeksu (git add .)...';
    git add .;
    
    # 3) git commit
    Write-Host 'рҹ“қ 3/5: Tworzenie commitu wydania...';
    if (git status --porcelain) {
        git commit -m "chore: release v$ver";
        Write-Host 'вң”пёҸ Commit utworzony pomyЕӣlnie.' -ForegroundColor Green;
    } else {
        Write-Host 'в„№пёҸ Repozytorium jest czyste, przypinam tag do aktualnego stanu.' -ForegroundColor DarkGray;
    }
    
    # 4) Pobranie hasza ostatniego commitu
    $hash = git rev-parse --short HEAD
    Write-Host "рҹ”Қ 4/5: Odczytano hasz commitu: $hash" -ForegroundColor Yellow;
    
    # 5) Utworzenie tagu (skЕӮadnia: git tag v[wersja] [hasz])
    Write-Host "рҹҸ·пёҸ 5/5: Przypinanie tagu v$ver do commitu $hash...";
    if (git tag -l "v$ver") { git tag -d "v$ver" | Out-Null }
    git tag "v$ver" $hash;
    
    Write-Host "`nвң… Wydanie v$ver pomyЕӣlnie zakoЕ„czone - rozwaЕј opublikowanie w rejestrze crates i na GitHubie!" -ForegroundColor Green;
    """
]

# ----------------------------------------------------
# H. PUBLIKOWANIE OTAGOWANEJ WERSJI
# ----------------------------------------------------

[tasks.v--pub-crates]
description = "Publikuje najnowszД… wersjДҷ paczki w rejestrze crates.io"
command = "cargo"
args = ["publish"]

[tasks.v--pub-github]
description = "Wypycha kod (gaЕӮД…Еә main) oraz lokalne tagi na GitHuba"
command = "powershell"
args = [
    "-Command",
    """
    $OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;
    
    Write-Host "`nрҹҡҖ 1/2: Wypychanie kodu (gaЕӮД…Еә main) na GitHuba..." -ForegroundColor Magenta;
    git push origin main;
    
    Write-Host "`nрҹҸ·пёҸ 2/2: Wypychanie tagГіw na serwer..." -ForegroundColor Cyan;
    git push origin main --tags;
    
    Write-Host "`nвң… Publikacja na GitHubie zakoЕ„czona sukcesem!" -ForegroundColor Green;
    """
]


