[tasks.fmt-c0-pre-op-snapshot-restore-point-draft]
description = "WstДҷpny snapshot (Zrzut obecnego stanu + proЕӣba o zapis IDE)"
command = "powershell"
args = [
    "-Command",
    """
    $OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;
    Write-Host 'рҹ“Ұ Zabezpieczanie obecnego stanu dysku (WstДҷpny zrzut)...';
    
    git add .;
    if (git status --porcelain) { 
        git commit -m 'chore: pre-operation backup (stan wstДҷpny)'; 
        Write-Host 'вң”пёҸ WstДҷpny commit wykonany.' -ForegroundColor Green;
    } else { 
        Write-Host 'в„№пёҸ Brak zmian na dysku do wstДҷpnego commita.' -ForegroundColor DarkGray;
    }

    Write-Host "`n`n";
    Write-Host '=====================================================' -ForegroundColor Red;
    Write-Host ' вҡ пёҸ  UWAGA: ZAPISZ PLIKI W EDYTORZE!  вҡ пёҸ ' -ForegroundColor Yellow;
    Write-Host '=====================================================' -ForegroundColor Red;
    Write-Host '1. WciЕӣnij teraz w VS Code skrГіt: Ctrl + K, a potem S' -ForegroundColor Cyan;
    Write-Host '2. Kiedy kropki na zakЕӮadkach zniknД…, uruchom gЕӮГіwny snapshot:' -ForegroundColor White;
    Write-Host 'рҹ‘ү cargo make fmt-c0-pre-op-snapshot-restore-point' -ForegroundColor Magenta;
    Write-Host "`n`n";
    """
]

[tasks.fmt-c0-pre-op-snapshot-restore-point]
description = "GЕӮГіwny snapshot (Zabezpiecza stan plikГіw w Gicie)"
command = "powershell"
args = [
    "-Command",
    """
    $OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;
    Write-Host 'рҹ“Ұ Weryfikacja i zabezpieczanie plikГіw (GЕӮГіwny zrzut)...';
    
    git add .;
    if (git status --porcelain) { 
        git commit -m 'chore: pre-operation backup (stan finalny)'; 
        Write-Host 'вң”пёҸ Snapshot gotowy. Pliki zabezpieczone w Gicie!' -ForegroundColor Green;
    } else { 
        Write-Host 'в„№пёҸ Brak zmian do zapisu. Wszystko jest zsynchronizowane.' -ForegroundColor DarkGray;
