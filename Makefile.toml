[tasks.snapshot-filetree-includes]
description = "Generuje snapshot struktury istotnych plikГіw projektu"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-x", "-v", "grid", "--save-address", "-b", "-a", "--lang", "en"
]

[tasks.snapshot-filetree-excludes]
description = "Generuje snapshot struktury nie-istotnych plikГіw projektu"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-m", "-v", "grid", "--save-address", "-b", "-a", "--lang", "en"
]

[tasks.snapshot-total-source-code]
description = "Generuje snapshot istotnych plikГіw kodu ЕәrГіdЕӮowego"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-p", "./.github/+", "-p", "!./.github/", 
	"-p", "./.vscode/+", "-p", "!./.vscode/", 
	"-p", "./.prompt/.src/+", "-p", "!./.prompt/.src/", 
	"-p", "./.prompt/.err/+", "-p", "!./.prompt/.err/", 
	"-p", "./LICENSE-APACHE", "-p", "./LICENSE-MIT", "-p", "*.lock", 
	"-p", ".gitattributes", "-p", ".gitignore", 
	"-x", "-v", "grid", "--save-archive", "-b", "-a", "--lang", "en"
]

