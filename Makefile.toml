[config]
skip_core_tasks = true

# --- CZYSZCZENIE HISTORII ---
[tasks.history-clean]
description = "Czyści zawartość folderu .history, ale zachowuje sam katalog"
command = "powershell"
args = [
	"-Command", 
	"if (Test-Path '.history\\*') { Remove-Item -Path '.history\\*' -Recurse -Force }; Write-Host 'Folder .history zostal wyczyszczony.'"
]

# --- CZYSZCZENIE diagnostyki ---
[tasks.errors-clean]
description = "Czyści zawartość folderu .err, ale zachowuje sam katalog"
command = "powershell"
args = [
	"-Command", 
	"if (Test-Path '.err\\*') { Remove-Item -Path '.err\\*' -Recurse -Force }; Write-Host 'Folder .err zostal wyczyszczony.'"
]

# --- CZYSZCZENIE tymczasowego schowka ---
[tasks.temps-clean]
description = "Czyści zawartość folderu .temp, ale zachowuje sam katalog"
command = "powershell"
args = [
	"-Command", 
	"if (Test-Path '.temp\\*') { Remove-Item -Path '.temp\\*' -Recurse -Force }; Write-Host 'Folder .temp zostal wyczyszczony.'"
]

# --- SNAPSHOT STRUKTURY ---
[tasks.history-snapshot-filetree]
description = "Generuje snapshot struktury projektu bez pełnego kodu"
command = "cargo"
args = [
	"plot", "-o", "./.history/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-x", "-v", "grid", "--save-address", "-b", "-a", "--lang", "en"
]

# --- SNAPSHOT PEŁNEGO KODU ---
[tasks.history-snapshot-totalcode]
description = "Generuje pełny snapshot archiwum z kodem i plikami konfiguracyjnymi"
command = "cargo"
args = [
	"plot", "-o", "./.history/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-p", "./.github/+", "-p", "!./.github/", 
	"-p", "./.vscode/+", "-p", "!./.vscode/", 
	"-p", "./.history/+", "-p", "!./.history/", 
	"-p", "./.err/+", "-p", "!./.err/", 
	"-p", "./LICENSE-APACHE", "-p", "./LICENSE-MIT", "-p", "*.lock", 
	"-p", ".gitattributes", "-p", ".gitignore", 
	"-x", "-v", "grid", "--save-archive", "-b", "-a", "--lang", "en"
]

# --- KOMENDA ZBIORCZA ---
[tasks.history-snapshot]
description = "Wykonuje oba snapshoty: strukturę oraz pełne archiwum"
dependencies = ["history-snapshot-filetree", "history-snapshot-totalcode"]

# --- KOMENDA "NA ŚWIEŻO" ---
[tasks.history-snapshot-fresh]
description = "Czyści historię i generuje nowe snapshoty (Serial execution)"
run_task = { name = ["history-clean", "history-snapshot"], parallel = false }

# --- DIAGNOSTYKA LOKALNA (CI/CD) - "SZCZĘŚLIWA PLIKÓW TRZYNASTKA" ---
[tasks.err-diag-setup]
description = "Przygotowanie folderu .err"
command = "powershell"
args = ["-Command", "if (-Not (Test-Path .err)) { New-Item -ItemType Directory -Path .err | Out-Null }"]

# --- MODUŁY 1-13 (Czysty PS7 Flow) ---

[tasks.err-diag-check]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo check --message-format short *> .err/01_check.log"]

[tasks.err-diag-examples]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo check --examples *> .err/02_check_examples.log"]

[tasks.err-diag-fmt]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo +nightly fmt -- --check *> .err/03_fmt_check.log"]

[tasks.err-diag-clippy-basic]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo clippy *> .err/04_clippy.log"]

[tasks.err-diag-clippy-strict]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo clippy --all-targets --all-features -- -D warnings *> .err/05_clippy_strict.log"]

[tasks.err-diag-test-compile]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo test --no-run *> .err/06_test_compile.log"]

[tasks.err-diag-doc-gen]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo doc --no-deps --document-private-items *> .err/07_doc_check.log"]

[tasks.err-diag-release-build]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo build --release *> .err/08_build_release.log"]

[tasks.err-diag-test-run]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo test --verbose *> .err/09_test_run.log"]

[tasks.err-diag-test-doc]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo test --doc *> .err/10_test_doc.log"]

[tasks.err-diag-package-list]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo package --list --allow-dirty *> .err/11_package_list.log"]

[tasks.err-diag-verify]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo verify-project *> .err/12_verify_project.log"]

[tasks.err-diag-audit]
dependencies = ["err-diag-setup"]
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; cargo audit *> .err/13_security_audit.log"]
# --- KOMENDA ZBIORCZA (COMBO) ---

[tasks.errors-snapshot]
description = "Uruchamia pełną diagnostykę Cargo 1-12 (Tuzin Inżyniera)"
run_task = { name = [
	"err-diag-check",
	"err-diag-examples",
	"err-diag-fmt",
	"err-diag-clippy-basic",
	"err-diag-clippy-strict",
	"err-diag-test-compile",
	"err-diag-doc-gen",
	"err-diag-release-build",
	"err-diag-test-run",
	"err-diag-test-doc",
	"err-diag-package-list",
	"err-diag-verify",
	"err-diag-audit"
], parallel = false }

# --- MODUŁY POMOCNICZE ---

[tasks.git-backup]
description = "Tworzy bezpieczny commit, jeśli są niezatwierdzone zmiany"
command = "powershell"
args = [
	"-Command",
	"Write-Host '📦 Zabezpieczanie pracy...'; if (git status --porcelain) { git add .; git commit -m 'chore: pre-operation backup'; Write-Host '✅ Zmiany zapisane w Gicie.' } else { Write-Host 'ℹ️ Brak zmian do zapisu.' }"
]

[tasks.fmt-fix-whitespace]
description = "Usuwa puste spacje z końców linii (naprawa błędu rustfmt)"
command = "powershell"
args = [
	"-Command",
	"Write-Host '🧹 Sprzątanie spacji...'; Get-ChildItem -Recurse *.rs | ForEach-Object { $content = Get-Content $_; $content | ForEach-Object { $_.TrimEnd() } | Set-Content $_ }; Write-Host '✅ Pliki .rs są teraz czyste.'"
]

# --- NAPRAWY KOMPILATORA I LINTERA (Z ZAPISEM DO LOGÓW) ---

[tasks.cargo-fix-core]
description = "Automatyczna naprawa błędów rustc"
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' -> 1/3 (A/{A,B,C}): Naprawa rustc (cargo fix)...'; cargo fix --allow-dirty --allow-no-vcs --all-targets --all-features *> .err/A_cargo_fix.log"]

[tasks.clippy-fix]
description = "Automatyczna naprawa sugestii Clippy"
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' -> 2/3 (B/{A,B,C}): Naprawa lintera (clippy --fix)...'; cargo clippy --fix --allow-dirty --all-targets --all-features *> .err/B_clippy_fix.log"]

[tasks.fmt-cargo]
description = "Standardowe formatowanie cargo +nightly fmt"
ignore_errors = true
command = "powershell"
args = ["-Command", "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' -> 3/3 (C/{A,B,C}): Formatowanie kodu (cargo +nightly fmt)...'; cargo +nightly fmt *> .err/C_cargo_fmt.log"]

# --- KOMENDA ZBIORCZA (COMBO) ---
# --- BEZPIECZNE FORMATOWANIE ---

[tasks.fmt-safe]
description = "Pełny cykl: Backup -> Spacje -> Clippy Fix -> Cargo Fmt"
run_task = { name = [
	"git-backup", 
	"fmt-fix-whitespace", 
	"cargo-fix-core",
	"clippy-fix", 
	"fmt-cargo"
], parallel = false }

# --- SPRAWDZANIE PLATFORM (Przenośność) ---

[tasks.check-wasm32]
description = "Sprawdza, czy biblioteka skompiluje się pod WebAssembly (przeglądarki)"
command = "cargo"
args = ["check", "--target", "wasm32-unknown-unknown", "--lib"]
# UWAGA: Aby to zadziałało, musisz mieć zainstalowany target.
# Odpal raz w konsoli: rustup target add wasm32-unknown-unknown

[tasks.check-wasm64]
description = "Sprawdza, czy biblioteka skompiluje się pod WebAssembly (przeglądarki)"
command = "cargo"
args = ["check", "--target", "wasm64-unknown-unknown", "--lib"]
# UWAGA: Aby to zadziałało, musisz mieć zainstalowany target.
# Odpal raz w konsoli: rustup target add wasm64-unknown-unknown

# --- AUTOMATYZACJA WERSJONOWANIA (TAG & PUSH) ---
[tasks.push-new-release-git]
description = "Tworzy nowy tag Git na podstawie wersji w Cargo.toml i wypycha na serwer"
command = "powershell"
args = [
	"-Command",
	"Write-Host \"🏷️ Odczytana wersja z Cargo.toml: v$env:CARGO_MAKE_CRATE_VERSION...\"; git tag v$env:CARGO_MAKE_CRATE_VERSION; Write-Host \"🚀 Wypychanie kodu i tagów na GitHuba...\"; git push origin main --tags"
]

# --- PUBLIKACJA NA CRATES.IO ---
[tasks.push-new-release-cargo]
description = "Publikuje najnowszą wersję paczki w rejestrze crates.io"
command = "cargo"
args = ["publish"]

[tasks.doc-full]
description = "Generuje najobszerniejszą dokumentację (prywatne API, wszystkie features i targety) i otwiera w przeglądarce"
command = "cargo"
args = [
    "doc",
    "--no-deps",
    "--document-private-items",
    "--all-features",
    "--examples",
    "--open"
]

# --- ALIASY ALFABETYCZNIE ---

[tasks.a]
alias = "history-snapshot"

[tasks.a_doc]
alias = "history-snapshot-totalcode"

[tasks.a_fs]
alias = "history-snapshot-filetree"

[tasks.a_clean]
alias = "history-clean"

[tasks.e]
alias = "errors-snapshot"

[tasks.e_clean]
alias = "errors-clean"

[tasks.f]
alias = "fmt-safe"

[tasks.f_clean]
alias = "errors-clean"

[tasks.next]
alias = "push-new-release-git"

[tasks.t_clean]
alias = "temps-clean"
