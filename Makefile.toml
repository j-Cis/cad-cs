description = "Pełny cykl: Backup -> Spacje -> Clippy Fix -> Cargo Fmt -> Cargo package list -> Cargo Audit"
run_task = { name = [
	"pre-op-snapshot-restore-point", 
	"fmt-fix-whitespace", 
	"cargo-fix-core",
	"clippy-fix", 
	"fmt-cargo",
	"err-diag-package-list",
	"err-diag-verify",
	"err-diag-audit"
], parallel = false }

# --- SPRAWDZANIE PLATFORM (Przenośność) ---

[tasks.check-wasm32]
description = "Sprawdza, czy biblioteka skompiluje się pod WebAssembly (przeglądarki)"
command = "cargo"
args = ["check", "--target", "wasm32-unknown-unknown", "--lib"]
# UWAGA: Aby to zadziałało, musisz mieć zainstalowany target.
# Odpal raz w konsoli: rustup target add wasm32-unknown-unknown

[tasks.check-wasm64]
description = "Sprawdza, czy biblioteka skompiluje się pod WebAssembly (przeglądarki)"
command = "cargo"
args = ["check", "--target", "wasm64-unknown-unknown", "--lib"]
# UWAGA: Aby to zadziałało, musisz mieć zainstalowany target.
# Odpal raz w konsoli: rustup target add wasm64-unknown-unknown


[tasks.doc-full]
description = "Generuje najobszerniejszą dokumentację (prywatne API, wszystkie features i targety) i otwiera w przeglądarce"
command = "cargo"
args = [
    "doc",
    "--no-deps",
    "--document-private-items",
    "--all-features",
    "--examples",
    "--open"
]



