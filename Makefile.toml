[config]
skip_core_tasks = true

# ====================================================
# ------ KOMENDY JEDNOSTKOWE :
# ------
# ------ ------ KONFIGURACJA
# ====================================================

[tasks.clear-contents-of-src-folder-under-prompt]
description = "Czyści zawartość folderu .prompt\\.src, ale zachowuje sam katalog"
command = "powershell"
args = [
	"-Command", 
	"if (Test-Path '.prompt\\.src\\*') { Remove-Item -Path '.prompt\\.src\\*' -Recurse -Force }; Write-Host 'Folder .prompt\\.src zostal wyczyszczony.'"
]

[tasks.clear-contents-of-err-folder-under-prompt]
description = "Czyści zawartość folderu .prompt\\.err, ale zachowuje sam katalog"
command = "powershell"
args = [
	"-Command", 
	"if (Test-Path '.prompt\\.err\\*') { Remove-Item -Path '.prompt\\.err\\*' -Recurse -Force }; Write-Host 'Folder .prompt\\.err zostal wyczyszczony.'"
]

[tasks.ensure-prompt-and-err-folders-exist]
description = "Przygotowanie folderu .prompt\\.err"
command = "powershell"
args = [
	"-Command",
	"if (-Not (Test-Path .prompt\\.err)) { New-Item -ItemType Directory -Path .prompt\\.err | Out-Null }"
]

[tasks.ensure-prompt-and-src-folders-exist]
description = "Przygotowanie folderu .prompt\\.src"
command = "powershell"
args = [
	"-Command",
	"if (-Not (Test-Path .prompt\\.src)) { New-Item -ItemType Directory -Path .prompt\\.src | Out-Null }"
]

# ====================================================
# ------ KOMENDY JEDNOSTKOWE :
# ------
# ------ ------ GENEROWANIE PLIKÓW
# ====================================================

[tasks.snapshot-filetree-includes]
description = "Generuje snapshot struktury istotnych plików projektu"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-x", "-v", "grid", "--save-address", "-b", "-a", "--lang", "en"
]

[tasks.snapshot-filetree-excludes]
description = "Generuje snapshot struktury nie-istotnych plików projektu"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-m", "-v", "grid", "--save-address", "-b", "-a", "--lang", "en"
]

[tasks.snapshot-total-source-code]
description = "Generuje snapshot istotnych plików kodu źródłowego"
command = "cargo"
args = [
	"plot", "-o", "./.prompt/.src/", 
	"-p", "./target/+", "-p", "!./target/", 
	"-p", "./.git/+", "-p", "!./.git/", 
	"-p", "./.github/+", "-p", "!./.github/", 
	"-p", "./.vscode/+", "-p", "!./.vscode/", 
	"-p", "./.prompt/.src/+", "-p", "!./.prompt/.src/", 
	"-p", "./.prompt/.err/+", "-p", "!./.prompt/.err/", 
	"-p", "./LICENSE-APACHE", "-p", "./LICENSE-MIT", "-p", "*.lock", 
	"-p", ".gitattributes", "-p", ".gitignore", 
	"-x", "-v", "grid", "--save-archive", "-b", "-a", "--lang", "en"
]

# ----------------------------------------------------------------------------------------------------------------------------------------------------


[tasks.err-diag-package-list]
dependencies = ["ensure-prompt-and-err-folders-exist"]
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 3/6 (D/{A,B,C,D,E,F}): 📖                                 '; cargo package --list --allow-dirty *> .err/c0_package_list.log"
]

[tasks.cargo-fix-core]
description = "Automatyczna naprawa błędów rustc"
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 1/6 (A/{A,B,C,D,E,F}): 📖 Naprawa rustc (cargo fix)...'; cargo fix --allow-dirty --allow-no-vcs --all-targets --all-features *> .err/c1_cargo_fix.log"
]

[tasks.clippy-fix]
description = "Automatyczna naprawa sugestii Clippy"
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 2/6 (B/{A,B,C,D,E,F}): 📖 Naprawa lintera (clippy --fix)...'; cargo clippy --fix --allow-dirty --all-targets --all-features *> .err/c2_clippy_fix.log"
]

[tasks.fmt-cargo]
description = "Standardowe formatowanie cargo +nightly fmt"
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 3/6 (C/{A,B,C,D,E,F}): 📖 Formatowanie kodu (cargo +nightly fmt)...'; cargo +nightly fmt *> .err/c3_cargo_fmt.log"
]

[tasks.err-diag-verify]
dependencies = ["ensure-prompt-and-err-folders-exist"]
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 3/6 (E/{A,B,C,D,E,F}): 📖                                 '; cargo verify-project *> .err/c4_verify_project.log"
]

[tasks.err-diag-audit]
dependencies = ["ensure-prompt-and-err-folders-exist"]
ignore_errors = true
command = "powershell"
args = [
	"-Command", 
	"[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; Write-Host ' 👉🏼 3/6 (F/{A,B,C,D,E,F}): 📖                                 '; cargo audit *> .err/c5_security_audit.log"
]

