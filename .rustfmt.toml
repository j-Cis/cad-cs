# Wymagane dla zaawansowanych opcji formatowania importów i komentarzy
unstable_features = true

hard_tabs = true
max_width = 100
edition = "2024"
newline_style = "Auto"

# KOMENDY: 
# rustfmt --print-config default
# rustfmt --help=config

# Skracanie inicjalizacji struktur
use_field_init_shorthand = true

# Złoto dla bibliotek matematycznych
use_small_heuristics = "Max"

# Nowoczesna obsługa błędów
use_try_shorthand = true

# Importy (use)
reorder_imports = true
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
imports_layout = "HorizontalVertical"

# formatowanie kodu w komentarzach potrójnych
format_code_in_doc_comments = true
normalize_doc_attributes = true

# --- WALKA Z NADMIARNYMI ENTERAMI ---

overflow_delimited_expr = true
where_single_line = true

# Formatowanie struktur i bloków
brace_style = "SameLine"
control_brace_style = "AlwaysSameLine"
indent_style = "Block"

# Pozwala na krótkie funkcje w jednej linii (np. proste gettery)
fn_single_line = true

# Pozwala trzymać proste 'if-else' w jednej linii
single_line_if_else_max_width = 60

# Zwiększa limit dla tablic i list (kluczowe przy Twoim Cs([x, y, z]))
array_width = 80
attr_fn_like_width = 80

# Pozwala na definicję prostych struktur w jednej linii
struct_lit_single_line = true

# Zwiększa szerokość dla wywołań funkcji zanim zostaną rozbite pionowo
fn_call_width = 80

# Agresywne łączenie elementów sterujących (np. if let)
combine_control_expr = true

# Usuwa zbędne puste linie, które rustfmt czasem zostawia
blank_lines_upper_bound = 1

# ---- INNE ----

hex_literal_case = "Upper"