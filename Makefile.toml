# [tasks.pre-op-snapshot-restore-point]
# description = "Tworzy bezpieczny commit, jeśli są niezatwierdzone zmiany"
# command = "powershell"
# args = [
# 	"-Command",
# 	"Write-Host '📦 Zabezpieczanie pracy...'; if (git status --porcelain) { git add .; git commit -m 'chore: pre-operation backup'; Write-Host '✅ Zmiany zapisane w Gicie.' } else { Write-Host 'ℹ️ Brak zmian do zapisu.' }"
# ]

[tasks.pre-op-snapshot-restore-point]
description = "Tworzy podwójny snapshot z wymuszeniem zapisu plików w VS Code"
command = "powershell"
args = [
    "-Command",
    """
    $OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;
    
    Write-Host '📦 1/3: Weryfikacja obecnego stanu dysku...';
    if (git status --porcelain) {
        git add .;
        git commit -m 'chore: pre-operation backup (stan początkowy)';
        Write-Host '✔️ Commit przed zapisem wykonany.';
    } else {
        Write-Host 'ℹ️ Brak zmian na dysku przed zapisem.';
    }

    Write-Host '💾 2/3: Wymuszam zapis wszystkich otwartych plików w VS Code...';
    code vscode://command/workbench.action.files.saveAll;

    Write-Host '⏳ Czekam 1 sekundę na zrzut buforów i indeksowanie Git...';
    Start-Sleep -Seconds 1; 

    Write-Host '📦 3/3: Weryfikacja dopalonych plików...';
    if (git status --porcelain) {
        git add .;
        git commit -m 'chore: pre-operation backup (dopalone pliki z RAM)';
        Write-Host '✔️ Commit po zapisie wykonany (uratowano niezapisane pliki!).';
    } else {
        Write-Host 'ℹ️ Brak zmian po zapisie (wszystko było już na dysku).';
    }
    """
]

# ====================================================
# ------ KOMENDY JEDNOSTKOWE :
# ------
# ------ ------ WALKA Z BIAŁYMI ZNAKAMI
# ====================================================

[tasks.fmt-fix-whitespace]
description = "Usuwa puste spacje z końców linii (naprawa błędu rustfmt)"
command = "powershell"
args = [
	"-Command",
	"Write-Host '🧹 Sprzątanie spacji...'; Get-ChildItem -Recurse *.rs | ForEach-Object { $content = Get-Content $_; $content | ForEach-Object { $_.TrimEnd() } | Set-Content $_ }; Write-Host '✅ Pliki .rs są teraz czyste.'"
]

# ====================================================
# ------ KOMENDY JEDNOSTKOWE :
# ------
# ------ ------ DODAWANIE TAGU WERSJI Z PLIKU CARGO
# ====================================================




# --- AUTOMATYZACJA WERSJONOWANIA (TAG & PUSH) ---
[tasks.push-new-release-git]
description = "Tworzy nowy tag Git na podstawie wersji w Cargo.toml i wypycha na serwer"
command = "powershell"
args = [
	"-Command",
	"Write-Host \"🏷️ Odczytana wersja z Cargo.toml: v$env:CARGO_MAKE_CRATE_VERSION...\"; git tag v$env:CARGO_MAKE_CRATE_VERSION; Write-Host \"🚀 Wypychanie kodu i tagów na GitHuba...\"; git push origin main --tags"
]

# --- PUBLIKACJA NA CRATES.IO ---
[tasks.push-new-release-cargo]
description = "Publikuje najnowszą wersję paczki w rejestrze crates.io"
command = "cargo"
args = ["publish"]












# ====================================================
# ------ KOMENDY JEDNOSTKOWE :
# ------
# ------ ------ WYŚWIETLENIE POMOCY
# ====================================================


[tasks.HELP]
description = "Wyświetla listę wszystkich autorskich komend, opisów i aliasów"
category = "Zarządzanie"
command = "cargo"
args = ["make", "--list-all-steps", "--output-format", "short-description"]


[tasks.help]
description = "Wyświetla posegregowaną listę komend: Aliasy, Komendy zbiorcze i Jednostki"
category = "Pomoc"
command = "powershell"
args = [
    "-Command",
    "$OutputEncoding = [System.Text.Encoding]::UTF8; [Console]::OutputEncoding = [System.Text.Encoding]::UTF8;",
    "$all = cargo make --list-all-steps --output-format short-description | Where-Object { $_ -match ' - ' -and $_ -notmatch '^(init|end|default)\b' };",
    "Write-Host \"`n`n🚀 --- NAJWAŻNIEJSZE (Z ALIASAMI) ---\" -ForegroundColor Cyan;",
    "$all | Where-Object { $_ -match '\\[aliases:' } | ForEach-Object { Write-Host $_ };",
    "Write-Host \"`n`n📦 --- KOMENDY ZBIORCZE (COMBO) ---\" -ForegroundColor Yellow;",
    "$all | Where-Object { $_ -notmatch '\\[aliases:' -and $_ -match 'snapshot|safe|release' } | ForEach-Object { Write-Host $_ };",
    "Write-Host \"`n`n🛠️ --- JEDNOSTKI (INDYWIDUALNE) ---\" -ForegroundColor White;",
    "$all | Where-Object { $_ -notmatch '\\[aliases:' -and $_ -notmatch 'snapshot|safe|release' } | ForEach-Object { Write-Host $_ };",
    "Write-Host \"`n\";"
]











# --- KOMENDA ZBIORCZA ---
[tasks.history-snapshot]
description = "Wykonuje oba snapshoty: strukturę oraz pełne archiwum"
dependencies = ["snapshot-filetree-includes", "snapshot-total-source-code"]

# --- KOMENDA "NA ŚWIEŻO" ---
[tasks.history-snapshot-fresh]
description = "Czyści historię i generuje nowe snapshoty (Serial execution)"
run_task = { name = ["clear-contents-of-src-folder-under-prompt", "history-snapshot"], parallel = false }

# --- DIAGNOSTYKA LOKALNA (CI/CD) ---

# --- MODUŁY 1-13 (Czysty PS7 Flow) ---



# --- MODUŁY POMOCNICZE ---



# --- NAPRAWY KOMPILATORA I LINTERA (Z ZAPISEM DO LOGÓW) ---

# --- KOMENDA ZBIORCZA (COMBO) ---


[tasks.errors-snapshot]
description = "Uruchamia pełną diagnostykę Cargo"
run_task = { name = [
	"err-diag-check",
	"err-diag-examples",
	"err-diag-fmt",
	"err-diag-clippy-basic",
	"err-diag-clippy-strict",
	"err-diag-test-compile",
	"err-diag-doc-gen",
	"err-diag-release-build",
	"err-diag-test-run",
	"err-diag-test-doc"
